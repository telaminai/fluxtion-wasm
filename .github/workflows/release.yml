name: Publish fluxtion-wasm-bootstrap to Repsy

# Push to the `release` branch to publish the bootstrap jar at its current version.
# Bump bootstrap/pom.xml <version> before pushing — Repsy's release repo rejects a
# re-deploy of an existing version, so a new publish == a new version.
on:
  push:
    branches: [release]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Log settings.xml
        run: cat .github/settings.xml

      # Deploy ONLY the bootstrap module. -pl scopes the reactor; bootstrap has no
      # intra-repo deps, so no -am needed. The capabilities TeaVM example and the
      # host-emitter prototype are not published.
      - name: Publish bootstrap to Repsy
        run: mvn -B -s .github/settings.xml -pl bootstrap -DskipTests deploy
        env:
          MAVEN_USERNAME: ${{ secrets.REPSY_USER }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.REPSY_PASSWORD }}

      - name: Tag the published version
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          VERSION=$(mvn -q -pl bootstrap --non-recursive -DforceStdout \
            help:evaluate -Dexpression=project.version)
          git tag -f "bootstrap-v$VERSION"
          git push -f origin "bootstrap-v$VERSION"

      - name: Merge release -> main
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: release
          target_branch: main
          github_token: ${{ github.token }}
