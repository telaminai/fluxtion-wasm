name: Publish fluxtion-wasm-bootstrap to Repsy

# Push to the `release` branch to publish the bootstrap jar at its current version.
# Bump bootstrap/pom.xml <version> before pushing — Repsy's release repo rejects a
# re-deploy of an existing version, so a new publish == a new version.
on:
  push:
    branches: [release]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Log settings.xml
        run: cat .github/settings.xml

      # Deploy ONLY the bootstrap module. -pl scopes the reactor; bootstrap has no
      # intra-repo deps, so no -am needed. The capabilities TeaVM example and the
      # host-emitter prototype are not published.
      - name: Publish bootstrap to Repsy
        run: mvn -B -s .github/settings.xml -pl bootstrap -DskipTests deploy
        env:
          MAVEN_USERNAME: ${{ secrets.REPSY_USER }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.REPSY_PASSWORD }}

      # Tag the exact commit that produced this artifact AND publish a GitHub Release
      # (gh creates the tag at --target). This is the recoverable record of a release:
      #   git checkout bootstrap-v<version>
      # and it populates https://github.com/telaminai/fluxtion-wasm/releases.
      # Version is read from the pom (no parent, so the first <version> is the project).
      - name: GitHub Release + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -m1 '<version>' bootstrap/pom.xml | sed -E 's/.*<version>([^<]+)<.*/\1/')
          echo "Releasing bootstrap-v$VERSION at $GITHUB_SHA"
          cat > /tmp/notes.md <<EOF
          Published to Repsy Maven (public).

          Maven coordinates:
            groupId:    com.telamin.fluxtion
            artifactId: fluxtion-wasm-bootstrap
            version:    $VERSION

          Read repository: https://repo.repsy.io/mvn/fluxtion/fluxtion-public
          EOF
          gh release create "bootstrap-v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "fluxtion-wasm-bootstrap $VERSION" \
            --notes-file /tmp/notes.md

      - name: Merge release -> main
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: release
          target_branch: main
          github_token: ${{ github.token }}
