name: Publish fluxtion-wasm-runtime to Repsy npm

# Push to the `release-npm` branch to publish the JS runtime at its current version.
# Bump runtime/package.json "version" before pushing — the registry rejects a
# re-publish of an existing version.
on:
  push:
    branches: [release-npm]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Scope @telamin -> repsy npm registry, with basic auth built from the same
      # REPSY_USER / REPSY_PASSWORD secrets the Maven publish uses. _auth is the
      # base64 of user:password; always-auth makes npm send it on publish.
      - name: Write .npmrc
        env:
          REPSY_USER: ${{ secrets.REPSY_USER }}
          REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}
        run: |
          AUTH=$(printf '%s:%s' "$REPSY_USER" "$REPSY_PASSWORD" | base64 -w0)
          {
            echo "@telamin:registry=https://repo.repsy.io/fluxtion/npm/"
            echo "//repo.repsy.io/fluxtion/npm/:_auth=$AUTH"
            echo "//repo.repsy.io/fluxtion/npm/:always-auth=true"
          } > .npmrc

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish

      # Tag + GitHub Release for the published JS version (gh creates the tag at
      # --target). Recoverable as `git checkout runtime-v<version>` and listed at
      # https://github.com/telaminai/fluxtion-wasm/releases.
      - name: GitHub Release + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Releasing runtime-v$VERSION at $GITHUB_SHA"
          cat > /tmp/notes.md <<EOF
          Published to Repsy npm.

          Install:
            npm config set @telamin:registry https://repo.repsy.io/fluxtion/npm/
            npm install @telamin/fluxtion-wasm-runtime@$VERSION
          EOF
          gh release create "runtime-v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "@telamin/fluxtion-wasm-runtime $VERSION" \
            --notes-file /tmp/notes.md

      - name: Remove .npmrc
        if: always()
        run: rm -f .npmrc
